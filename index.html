    <script>
    (function(){
        function draw(){
            var c=document.createElement('canvas');c.width=64;c.height=64;
            var x=c.getContext('2d'), dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
            x.beginPath();x.arc(32,32,30,0,Math.PI*2);
            x.fillStyle=dark?'#5a6b5f':'#c8d6cc';x.fill();
            x.font=(dark?'bold 48px':'48px')+' serif';x.textAlign='center';x.textBaseline='middle';
            x.fillStyle=dark?'#b4c5b9':'#fff';x.fillText('✓',32,34);
            document.getElementById('favicon').href=c.toDataURL('image/png');
        }
        draw();
        window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',draw);
    })();
    </script>

<div class="app-card">

<script>
(function() {
    const SUPABASE_URL = 'https://sxccuavdavgygfptloxv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_YJJac02k8LI1wKYYGx2-lg_Y66jMN5T';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let authReady = true;
    console.log('✅ Supabase 数据库已连接');

    const TempDB = {
        getTempTasks() {
            try { return JSON.parse(localStorage.getItem('tempTasks')) || []; } catch { return []; }
        },
        saveTempTasks(tasks) {
            localStorage.setItem('tempTasks', JSON.stringify(tasks));
            localStorage.setItem('tempLastActive', Date.now().toString());
        },
        checkTempExpiry() {
            const last = localStorage.getItem('tempLastActive');
            if (last && (Date.now() - parseInt(last) > 24 * 3600 * 1000)) {
                localStorage.removeItem('tempTasks');
                localStorage.removeItem('tempLastActive');
                return true;
            }
            return false;
        }
    };

    let currentUser = null;
    let tasks = [];
    let isTemporary = true;
    let currentDefaultColor = '#C7B2A2';
    let sortableInstance = null;

    const todoListEl = document.getElementById('todoList');
    const emptyPlaceholder = document.getElementById('emptyPlaceholder');
    const taskTitleInput = document.getElementById('taskTitle');
    const taskDueDateInput = document.getElementById('taskDueDate');
    const addBtn = document.getElementById('addTaskBtn');
    const clearCompletedBtn = document.getElementById('clearCompletedBtn');
    const displayName = document.getElementById('displayName');
    const displayMotto = document.getElementById('displayMotto');
    const loginModal = document.getElementById('loginModal');
    const choiceStep = document.getElementById('choiceStep');
    const formStep = document.getElementById('formStep');
    const choiceNew = document.getElementById('choiceNew');
    const choiceOld = document.getElementById('choiceOld');
    const formBackBtn = document.getElementById('formBackBtn');
    const newUserForm = document.getElementById('newUserForm');
    const loginName = document.getElementById('loginName');
    const loginMotto = document.getElementById('loginMotto');
    const formActionBtn = document.getElementById('formActionBtn');
    const loginError = document.getElementById('loginError');
    const oldUserForm = document.getElementById('oldUserForm');
    const oldLoginName = document.getElementById('oldLoginName');
    const mottoDisplayArea = document.getElementById('mottoDisplayArea');
    const foundMottoText = document.getElementById('foundMottoText');
    const confirmItIsMe = document.getElementById('confirmItIsMe');
    const confirmNotMe = document.getElementById('confirmNotMe');
    const oldLoginError = document.getElementById('oldLoginError');
    let searchedUser = null;

    function showToast(msg, dur=1800) {
        let t = document.querySelector('.toast-msg');
        if(t) t.remove();
        const d = document.createElement('div');
        d.className = 'toast-msg';
        d.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1e293bdd; backdrop-filter:blur(12px); color:#fff; padding:6px 18px; border-radius:40px; font-size:0.8rem; z-index:2000; pointer-events:none;';
        d.innerText = msg;
        document.body.appendChild(d);
        setTimeout(()=>d.remove(), dur);
    }

    async function loadCloudTasks(userId) {
        if (!userId) return [];
        try {
            const { data, error } = await supabase
                .from('tasks')
                .select('*')
                .eq('user_id', userId);
            if (error) throw error;
            const tasks = (data || []).map(t => ({
                id: String(t.id),
                title: t.title,
                completed: t.completed,
                color: t.color,
                due: t.due,
                reminded: t.reminded,
                created_at: t.created_at,
                updated_at: t.updated_at || t.created_at
            }));
            return dedupeByTitle(tasks);
        } catch (error) {
            console.error('加载云端任务失败', error);
            return [];
        }
    }

    function dedupeByTitle(taskList) {
        if (taskList.length <= 1) return taskList;
        const result = [...taskList];
        const toRemove = new Set();
        for (let i = 0; i < result.length; i++) {
            if (toRemove.has(i)) continue;
            for (let j = i + 1; j < result.length; j++) {
                if (toRemove.has(j)) continue;
                const a = result[i].title.trim();
                const b = result[j].title.trim();
                if (a === b || a.includes(b) || b.includes(a)) {
                    const getTime = (t) => {
                        const ts = t.updated_at || t.created_at;
                        return ts ? new Date(ts).getTime() : 0;
                    };
                    const timeA = getTime(result[i]);
                    const timeB = getTime(result[j]);
                    if (timeA >= timeB) {
                        toRemove.add(j);
                    } else {
                        toRemove.add(i);
                        break;
                    }
                }
            }
        }
        return result.filter((_, idx) => !toRemove.has(idx));
    }

    let cloudSyncBusy = false;
    let pendingSync = false;

    async function saveCloudTasks(userId, localTasks) {
        if (!userId) return false;
        if (cloudSyncBusy) {
            pendingSync = true;
            return false;
        }
        cloudSyncBusy = true;
        try {
            const { data: rawData, error: fetchErr } = await supabase
                .from('tasks')
                .select('*')
                .eq('user_id', userId);
            if (fetchErr) throw fetchErr;
            const rawCloudTasks = (rawData || []).map(t => ({
                id: String(t.id),
                title: t.title,
                completed: t.completed,
                color: t.color,
                due: t.due,
                reminded: t.reminded,
                created_at: t.created_at,
                updated_at: t.updated_at || t.created_at
            }));

            const cloudByTitle = {};
            const duplicateIds = [];
            rawCloudTasks.forEach(t => {
                const key = t.title.trim();
                if (cloudByTitle[key]) {
                    const existing = cloudByTitle[key];
                    if (Number(t.id) < Number(existing.id)) {
                        duplicateIds.push(Number(existing.id));
                        cloudByTitle[key] = t;
                    } else {
                        duplicateIds.push(Number(t.id));
                    }
                } else {
                    cloudByTitle[key] = t;
                }
            });
            if (duplicateIds.length > 0) {
                await supabase.from('tasks').delete().in('id', duplicateIds);
            }

            const localByTitle = {};
            for (const lt of localTasks) {
                const key = lt.title.trim();
                if (!localByTitle[key]) {
                    localByTitle[key] = lt;
                } else {
                    const existing = localByTitle[key];
                    const existingHasCloudId = cloudByTitle[key] && String(existing.id) === String(cloudByTitle[key].id);
                    const ltHasCloudId = cloudByTitle[key] && String(lt.id) === String(cloudByTitle[key].id);
                    if (ltHasCloudId && !existingHasCloudId) {
                        localByTitle[key] = lt;
                    }
                }
            }

            const toUpdate = [];
            const toInsert = [];
            const localTitles = new Set(Object.keys(localByTitle));
            for (const [title, lt] of Object.entries(localByTitle)) {
                const cloudTask = cloudByTitle[title];
                if (cloudTask) {
                    lt.id = String(cloudTask.id);
                    toUpdate.push(lt);
                } else {
                    toInsert.push(lt);
                }
            }
            const toDelete = [];
            for (const [title, ct] of Object.entries(cloudByTitle)) {
                if (!localTitles.has(title)) toDelete.push(ct);
            }

            if (toDelete.length > 0) {
                const ids = toDelete.map(t => Number(t.id));
                await supabase.from('tasks').delete().in('id', ids);
            }
            if (toInsert.length > 0) {
                const rows = toInsert.map(t => ({
                    user_id: userId,
                    title: t.title,
                    completed: t.completed,
                    color: t.color || '#C7B2A2',
                    due: t.due || null,
                    reminded: t.reminded || false,
                    updated_at: new Date().toISOString()
                }));
                const { data: insData, error: insErr } = await supabase.from('tasks').insert(rows).select();
                if (insErr) throw insErr;
                if (insData) {
                    insData.forEach((dbTask, idx) => {
                        const localTask = toInsert[idx];
                        if (localTask) localTask.id = String(dbTask.id);
                    });
                }
            }
            for (const t of toUpdate) {
                await supabase.from('tasks').update({
                    title: t.title,
                    completed: t.completed,
                    color: t.color || '#C7B2A2',
                    due: t.due || null,
                    reminded: t.reminded || false,
                    updated_at: new Date().toISOString()
                }).eq('id', t.id);
            }

            const merged = [...Object.values(localByTitle)];
            tasks.length = 0;
            tasks.push(...merged);
            return true;
        } catch (error) {
            console.error('同步任务失败', error);
            showToast('同步失败: ' + (error.message || '未知错误'), 3000);
            return false;
        } finally {
            cloudSyncBusy = false;
            if (pendingSync) {
                pendingSync = false;
                saveCloudTasks(userId, [...tasks]);
            }
        }
    }

    async function deleteCloudTask(taskId) {
        if (!currentUser) return;
        try {
            await supabase.from('tasks').delete().eq('id', String(taskId));
        } catch (e) {
            console.error('删除云端任务失败', e);
        }
    }

    let syncTimer = null;
    let statusTimer = null;

    function saveTasks() {
        localStorage.setItem('localTaskCache', JSON.stringify({
            userId: currentUser ? currentUser.id : null,
            tasks: tasks,
            updatedAt: Date.now()
        }));
        TempDB.saveTempTasks(tasks);
        if (currentUser) {
            clearTimeout(syncTimer);
            syncTimer = setTimeout(() => {
                const snapshot = tasks.map(t => ({ ...t }));
                saveCloudTasks(currentUser.id, snapshot).then(ok => {
                    if (ok) {
                        localStorage.setItem('localTaskCache', JSON.stringify({
                            userId: currentUser.id,
                            tasks: tasks,
                            updatedAt: Date.now()
                        }));
                        renderTasks();
                    } else {
                        showToast('同步云端失败', 1500);
                    }
                });
            }, 300);
        }
    }

    function checkExpiryAndNotify() {
        const now = new Date();
        let hasChange = false;
        tasks.forEach(t => {
            if (!t.completed && t.due && !t.reminded) {
                const dueDate = new Date(t.due);
                if (dueDate <= now) {
                    t.reminded = true;
                    hasChange = true;
                    if ('Notification' in window && Notification.permission === 'granted') {
                        new Notification('任务已到期', { body: t.title });
                    }
                    showToast(`⚠️ "${t.title}" 已到期`, 3000);
                }
            }
        });
        if (hasChange) { saveTasks(); renderTasks(); }
    }

    function startStatusTimer() {
        if (statusTimer) clearInterval(statusTimer);
        statusTimer = setInterval(() => {
            updateStats();
            const dueEls = document.querySelectorAll('.todo-due');
            dueEls.forEach(el => {
                const idx = parseInt(el.closest('.todo-item')?.dataset?.index);
                if (idx !== undefined && tasks[idx] && tasks[idx].due) {
                    const cls = getDueClass(tasks[idx].due);
                    el.className = `todo-due ${cls}`;
                    if (tasks[idx].due) {
                        if (cls === 'due-urgent') el.innerHTML = `⚠️ ${formatDueDate(tasks[idx].due)}`;
                        else if (cls === 'due-soon') el.innerHTML = `⏳ ${formatDueDate(tasks[idx].due)}`;
                        else el.innerHTML = `📅 ${formatDueDate(tasks[idx].due)}`;
                    }
                }
            });
            checkExpiryAndNotify();
        }, 5000);
    }

    function requestNotificationPermission() {
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    }

    async function loadTasks() {
        if (currentUser) {
            const cache = localStorage.getItem('localTaskCache');
            if (cache) {
                try {
                    const cached = JSON.parse(cache);
                    if (cached.userId === currentUser.id && cached.tasks) {
                        tasks = cached.tasks;
                        renderTasks();
                    }
                } catch {}
            }
            const cloudTasks = await loadCloudTasks(currentUser.id);
            tasks = cloudTasks;
            renderTasks();
            localStorage.setItem('localTaskCache', JSON.stringify({
                userId: currentUser.id,
                tasks: cloudTasks,
                updatedAt: Date.now()
            }));
        } else {
            tasks = TempDB.getTempTasks();
            renderTasks();
        }
    }

    function updateUI() {
        if (currentUser) {
            displayName.innerText = currentUser.name;
            displayMotto.innerText = currentUser.motto;
        } else {
            displayName.innerText = '临时用户';
            displayMotto.innerText = '活在当下';
        }
    }

    function updateStats() {
        const now = new Date();
        const completed = tasks.filter(t => t.completed).length;
        const expired = tasks.filter(t => !t.completed && t.due && new Date(t.due) < now).length;
        const active = tasks.filter(t => !t.completed && (!t.due || new Date(t.due) >= now)).length;
        document.getElementById('completedCount').innerText = completed;
        document.getElementById('expiredCount').innerText = expired;
        document.getElementById('activeCount').innerText = active;
    }

    function formatDueDate(dueISO) {
        if (!dueISO) return '';
        const d = new Date(dueISO);
        if (isNaN(d.getTime())) return '无效';
        return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    function getDueClass(dueISO) {
        if (!dueISO) return '';
        const now = new Date();
        const due = new Date(dueISO);
        if (isNaN(due)) return '';
        const diff = due - now;
        if (diff < 0) return 'due-urgent';
        if (diff <= 3600000) return 'due-soon';
        return 'due-normal';
    }

    function renderTasks() {
        todoListEl.innerHTML = '';
        const scrollEl = document.getElementById('todoListScroll');
        if (tasks.length === 0) {
            emptyPlaceholder.style.display = 'block';
            todoListEl.style.display = 'none';
            if (scrollEl) scrollEl.style.maxHeight = 'none';
            updateStats();
            return;
        }
        emptyPlaceholder.style.display = 'none';
        todoListEl.style.display = 'flex';

        tasks.forEach((task, index) => {
            const li = document.createElement('li');
            li.className = 'todo-item';
            if (task.completed) li.classList.add('completed-task');
            li.style.borderLeftColor = task.color || '#C7B2A2';
            li.setAttribute('data-index', index);

            const checkDiv = document.createElement('div');
            checkDiv.className = 'todo-check';
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = task.completed;
            cb.addEventListener('change', (e) => {
                e.stopPropagation();
                task.completed = cb.checked;
                saveTasks();
                renderTasks();
            });
            checkDiv.appendChild(cb);

            const titleSpan = document.createElement('span');
            titleSpan.className = 'todo-title';
            titleSpan.innerText = task.title;
            titleSpan.addEventListener('click', (e) => {
                e.stopPropagation();
                const oldTitle = task.title;
                const input = document.createElement('input');
                input.type = 'text';
                input.value = task.title;
                input.className = 'inline-edit-input';
                const finishEdit = () => {
                    const newTitle = input.value.trim();
                    if (newTitle && newTitle !== oldTitle) {
                        task.title = newTitle;
                        saveTasks();
                    }
                    renderTasks();
                };
                input.addEventListener('blur', finishEdit);
                input.addEventListener('keypress', (ev) => { if (ev.key === 'Enter') input.blur(); });
                input.addEventListener('keydown', (ev) => { if (ev.key === 'Escape') { input.value = oldTitle; input.blur(); } });
                titleSpan.replaceWith(input);
                input.focus();
                input.select();
            });

            const dueDeleteWrapper = document.createElement('div');
            dueDeleteWrapper.className = 'due-and-delete';
            const dueSpan = document.createElement('span');
            dueSpan.className = `todo-due ${getDueClass(task.due)}`;
            if (task.due) {
                dueSpan.innerHTML = `📅 ${formatDueDate(task.due)}`;
                if (getDueClass(task.due) === 'due-urgent') dueSpan.innerHTML = `⚠️ ${formatDueDate(task.due)}`;
                else if (getDueClass(task.due) === 'due-soon') dueSpan.innerHTML = `⏳ ${formatDueDate(task.due)}`;
            } else {
                dueSpan.innerHTML = '⏚ 无期限';
            }
            dueSpan.addEventListener('click', (e) => {
                e.stopPropagation();
                const input = document.createElement('input');
                input.type = 'datetime-local';
                if (task.due) {
                    const d = new Date(task.due);
                    const pad = (n) => String(n).padStart(2,'0');
                    input.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
                }
                input.className = 'inline-due-input';
                const finishEdit = () => {
                    if (input.value) {
                        const d = new Date(input.value);
                        if (!isNaN(d.getTime())) { task.due = d.toISOString(); task.reminded = false; }
                    } else { task.due = null; task.reminded = false; }
                    saveTasks();
                    renderTasks();
                };
                input.addEventListener('blur', finishEdit);
                input.addEventListener('keypress', (ev) => { if (ev.key === 'Enter') input.blur(); });
                input.addEventListener('keydown', (ev) => { if (ev.key === 'Escape') renderTasks(); });
                dueSpan.replaceWith(input);
                input.focus();
            });

            const deleteBtn = document.createElement('button');
            deleteBtn.innerHTML = '✕';
            deleteBtn.className = 'delete-simple';
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const removed = tasks.splice(index, 1);
                if (removed.length > 0 && currentUser) deleteCloudTask(removed[0].id);
                saveTasks();
                renderTasks();
                showToast('已删除', 800);
            });
            dueDeleteWrapper.appendChild(dueSpan);
            dueDeleteWrapper.appendChild(deleteBtn);
            li.appendChild(checkDiv);
            li.appendChild(titleSpan);
            li.appendChild(dueDeleteWrapper);
            todoListEl.appendChild(li);
        });

        document.querySelectorAll('.todo-item').forEach(item => {
            item.addEventListener('dblclick', (e) => {
                if (e.target.closest('.todo-check') || e.target.closest('.delete-simple') || e.target.closest('.todo-due')) return;
                const idx = parseInt(item.dataset.index);
                const task = tasks[idx];
                if (!task) return;
                const picker = document.createElement('input');
                picker.type = 'color';
                picker.value = task.color || '#C7B2A2';
                picker.addEventListener('input', (e) => { task.color = e.target.value; saveTasks(); renderTasks(); });
                picker.click();
            });
        });

        if (sortableInstance) sortableInstance.destroy();
        sortableInstance = new Sortable(todoListEl, {
            animation: 200,
            ghostClass: 'sortable-drag',
            filter: '.todo-check, .todo-check input, .todo-due, .inline-due-input, .inline-edit-input, .delete-simple',
            preventOnFilter: false,
            onEnd: () => {
                const items = document.querySelectorAll('#todoList .todo-item');
                const newOrder = [];
                items.forEach(li => { const idx = parseInt(li.dataset.index); newOrder.push(tasks[idx]); });
                tasks = newOrder;
                saveTasks();
                renderTasks();
            }
        });
        updateStats();
    }

    function getTempTasksForMerge() {
        return TempDB.getTempTasks().filter(t => !t.completed);
    }

    function mergeTempTasks() {
        if (!currentUser || !isTemporary) {
            const tempTasks = getTempTasksForMerge();
            if (tempTasks.length > 0) {
                const existingTitles = new Set(tasks.map(t => t.title));
                const newTasks = tempTasks.filter(t => !existingTitles.has(t.title));
                if (newTasks.length > 0) {
                    tasks = [...newTasks, ...tasks];
                    saveTasks();
                    showToast(`已同步 ${newTasks.length} 条临时任务`, 2000);
                }
                TempDB.saveTempTasks([]);
            }
        }
    }

    function openLoginModal() {
        choiceStep.style.display = 'block';
        formStep.style.display = 'none';
        loginName.value = '';
        loginMotto.value = '';
        oldLoginName.value = '';
        mottoDisplayArea.style.display = 'none';
        loginError.innerText = '';
        oldLoginError.innerText = '';
        newUserForm.style.display = 'block';
        oldUserForm.style.display = 'none';
        searchedUser = null;
        loginModal.classList.add('active');
    }

    function closeLoginModal() { loginModal.classList.remove('active'); }

    function showNewUserForm() {
        choiceStep.style.display = 'none';
        formStep.style.display = 'block';
        newUserForm.style.display = 'block';
        oldUserForm.style.display = 'none';
        loginError.innerText = '';
        loginName.value = '';
        loginMotto.value = '';
        setTimeout(() => loginName.focus(), 100);
    }

    function showOldUserForm() {
        choiceStep.style.display = 'none';
        formStep.style.display = 'block';
        newUserForm.style.display = 'none';
        oldUserForm.style.display = 'block';
        oldLoginName.value = '';
        mottoDisplayArea.style.display = 'none';
        oldLoginError.innerText = '';
        searchedUser = null;
        setTimeout(() => oldLoginName.focus(), 100);
    }

    async function handleNewUserSubmit() {
        const name = loginName.value.trim();
        const motto = loginMotto.value.trim();
        if (!name || !motto) { loginError.innerText = '请完整填写'; return; }
        if (/\s/.test(name)) { loginError.innerText = 'nickname 不能包含空格'; return; }
        try {
            const { data: existing } = await supabase.from('users').select('*').eq('name', name);
            if (existing && existing.length > 0) { loginError.innerText = 'You were here! Old friend?'; return; }
            const { data: newUser } = await supabase.from('users').insert({ name, motto }).select().single();
            currentUser = { id: newUser.id, name, motto };
            isTemporary = false;
            localStorage.setItem('savedUser', JSON.stringify({ name, motto }));
            closeLoginModal();
            await loadTasks();
            mergeTempTasks();
            renderTasks();
            updateUI();
            setupRealtimeSync();
            showToast(`欢迎，${currentUser.name}`);
        } catch (err) {
            loginError.innerText = '注册失败: ' + err.message;
        }
    }

    async function handleOldUserSearch() {
        const name = oldLoginName.value.trim();
        if (!name) { oldLoginError.innerText = '请输入 nickname'; return; }
        if (/\s/.test(name)) { oldLoginError.innerText = 'nickname 不能包含空格'; return; }
        try {
            const { data } = await supabase.from('users').select('*').eq('name', name);
            if (!data || data.length === 0) { oldLoginError.innerText = '未找到该用户'; mottoDisplayArea.style.display = 'none'; searchedUser = null; return; }
            const user = data[0];
            foundMottoText.innerText = user.motto;
            mottoDisplayArea.style.display = 'block';
            oldLoginError.innerText = '';
            searchedUser = { id: user.id, name: user.name, motto: user.motto };
        } catch (err) { oldLoginError.innerText = '搜索失败: ' + err.message; searchedUser = null; }
    }

    async function handleOldUserConfirm() {
        if (!searchedUser) { oldLoginError.innerText = '请先搜索用户'; return; }
        currentUser = { id: searchedUser.id, name: searchedUser.name, motto: searchedUser.motto };
        isTemporary = false;
        localStorage.setItem('savedUser', JSON.stringify({ name: currentUser.name, motto: currentUser.motto }));
        closeLoginModal();
        await loadTasks();
        mergeTempTasks();
        renderTasks();
        updateUI();
        setupRealtimeSync();
        showToast(`欢迎回来，${currentUser.name}`);
    }

    function handleOldUserNotMe() {
        oldLoginName.value = '';
        mottoDisplayArea.style.display = 'none';
        searchedUser = null;
        oldLoginError.innerText = '';
        oldLoginName.focus();
    }

    displayName.addEventListener('click', openLoginModal);
    choiceNew.addEventListener('click', showNewUserForm);
    choiceOld.addEventListener('click', showOldUserForm);
    formBackBtn.addEventListener('click', () => {
        choiceStep.style.display = 'block'; formStep.style.display = 'none';
        loginError.innerText = ''; oldLoginError.innerText = ''; mottoDisplayArea.style.display = 'none'; searchedUser = null;
    });
    formActionBtn.addEventListener('click', handleNewUserSubmit);
    loginMotto.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleNewUserSubmit(); });
    loginName.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginMotto.focus(); });

    let nameCheckTimer = null;
    loginName.addEventListener('input', () => {
        const name = loginName.value.trim();
        if (!name || /\s/.test(name)) { loginError.innerText = ''; return; }
        clearTimeout(nameCheckTimer);
        nameCheckTimer = setTimeout(async () => {
            try {
                const { data } = await supabase.from('users').select('name').eq('name', name).limit(1);
                if (data && data.length > 0) loginError.innerText = "You were here! Old friend?";
                else loginError.innerText = '';
            } catch {}
        }, 400);
    });

    oldLoginName.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleOldUserSearch(); } });
    confirmItIsMe.addEventListener('click', handleOldUserConfirm);
    confirmNotMe.addEventListener('click', handleOldUserNotMe);
    loginModal.addEventListener('click', (e) => { if (e.target === loginModal) closeLoginModal(); });

    addBtn.addEventListener('click', () => {
        const title = taskTitleInput.value.trim();
        if (!title) { showToast('写点想做的小事吧'); return; }
        let due = null;
        if (taskDueDateInput.value) { const d = new Date(taskDueDateInput.value); if (!isNaN(d.getTime())) due = d.toISOString(); }
        tasks.unshift({ id: String(Date.now()), title, completed: false, color: currentDefaultColor, due, reminded: false });
        saveTasks();
        renderTasks();
        taskTitleInput.value = '';
        taskDueDateInput.value = '';
        showToast(`添加了 "${title}"`);
    });
    taskTitleInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addBtn.click(); });

    clearCompletedBtn.addEventListener('click', () => {
        const undone = tasks.filter(t => !t.completed);
        if (undone.length === tasks.length) { showToast('没有已完成的任务'); return; }
        const completed = tasks.filter(t => t.completed);
        completed.forEach(t => { if (currentUser) deleteCloudTask(t.id); });
        tasks = undone;
        saveTasks();
        renderTasks();
        showToast('已清空已完成任务');
    });

    document.querySelectorAll('.color-swatch').forEach(el => {
        el.addEventListener('click', () => {
            const color = el.dataset.color;
            if (color) {
                currentDefaultColor = color;
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                el.classList.add('active');
            }
        });
        if (el.dataset.color === '#C7B2A2') el.classList.add('active');
    });

    window.logout = function() {
        if (currentUser) saveCloudTasks(currentUser.id, tasks);
        localStorage.removeItem('savedUser');
        currentUser = null;
        isTemporary = true;
        loadTasks().then(() => { renderTasks(); updateUI(); showToast('已退出'); });
    };

    async function init() {
        if (typeof supabase === 'undefined') {
            tasks = TempDB.getTempTasks();
            renderTasks();
            updateUI();
            startStatusTimer();
            return;
        }
        requestNotificationPermission();
        if (TempDB.checkTempExpiry()) { tasks = []; TempDB.saveTempTasks(tasks); }

        const savedUser = localStorage.getItem('savedUser');
        if (savedUser) {
            try {
                const parsed = JSON.parse(savedUser);
                const { data } = await supabase.from('users').select('*').eq('name', parsed.name).eq('motto', parsed.motto);
                if (data && data.length > 0) {
                    const user = data[0];
                    currentUser = { id: user.id, name: user.name, motto: user.motto };
                    isTemporary = false;
                } else {
                    localStorage.removeItem('savedUser');
                    currentUser = null;
                    isTemporary = true;
                }
            } catch (e) {
                localStorage.removeItem('savedUser');
                currentUser = null;
                isTemporary = true;
            }
        }
        await loadTasks();
        renderTasks();
        updateUI();

        const now = new Date();
        const pad = (n) => String(n).padStart(2, '0');
        taskDueDateInput.setAttribute('min', `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`);
        const updateDateInputStyle = () => {
            taskDueDateInput.classList.toggle('has-value', !!taskDueDateInput.value);
        };
        taskDueDateInput.addEventListener('change', updateDateInputStyle);
        taskDueDateInput.addEventListener('input', updateDateInputStyle);
        updateDateInputStyle();
        startStatusTimer();
        setupRealtimeSync();
    }

    function setupRealtimeSync() {
        if (currentUser && typeof supabase !== 'undefined') {
            supabase
                .channel('tasks-sync')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks', filter: `user_id=eq.${currentUser.id}` },
                    async () => {
                        const cloudTasks = await loadCloudTasks(currentUser.id);
                        tasks = cloudTasks;
                        renderTasks();
                        localStorage.setItem('localTaskCache', JSON.stringify({ userId: currentUser.id, tasks: cloudTasks, updatedAt: Date.now() }));
                    })
                .subscribe();
        }
    }

    init();
})();
</script>
</body>
